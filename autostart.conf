exec-once= "dbus-update-activation-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots"
exec-once=pipewire & pipewire-pulse & wireplumber &
exec-once=swww-daemon
exec-once=matugen image "$(cat ~/.cache/last_wallpaper)"
exec-once=waybar
exec-once=dunst &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once=flameshot
exec-once=Discord --start-minimized
exec-once=~/x/pano-scrobbler-linux-x64.AppImage --minimized
exec-once=mpd
exec-once=mpd-mpris &
exec-once=sh -c 'sleep 4; ~/x/musicpresence*.AppImage'
exec-once=steam -silent
exec-once=flatpak run com.dec05eba.gpu_screen_recorder gsr-ui
